<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aeroambulancias Silva - Enlaces</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #333;
        }
        .container {
            max-width: 480px;
            width: 100%;
            text-align: center;
            margin-top: 40px;
        }
        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #0056b3; /* Azul médico */
        }
        h1 {
            font-size: 1.4rem;
            margin: 15px 0 5px 0;
            color: #002d62;
        }
        p {
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 30px;
        }
        .link-btn {
            display: block;
            background-color: #0056b3; /* Botón azul principal */
            color: white;
            text-decoration: none;
            margin-bottom: 16px;
            padding: 15px;
            border-radius: 8px;
            font-weight: 600;
            transition: transform 0.2s, background-color 0.2s;
            box-shadow: 0 4px 6px rgba=0,0,0,0.05);
        }
        .link-btn:hover {
            background-color: #003d80;
            transform: translateY(-2px);
        }
        /* Botón destacado para Urgencias */
        .btn-urgente {
            background-color: #d9534f; /* Rojo de emergencia */
        }
        .btn-urgente:hover {
            background-color: #c9302c;
        }
    </style>
</head>
<body>

    <div class="container">
        <img class="profile-img" src="https://www.aeroambulanciasilva.com/web/image/website/1/logo" alt="Aeroambulancias Silva">
        
        <h1>Aeroambulancias Silva</h1>
        <p>Servicio de Traslado Aéreo Médico Autorizado</p>

        <a href="tel:+58XXXXXXX" class="link-btn btn-urgente">🚨 LLAMAR A URGENCIAS</a>
        <a href="https://wa.me/tu-numero" class="link-btn">💬 Cotizar por WhatsApp</a>
        <a href="https://www.aeroambulanciasilva.com/" class="link-btn">🌐 Visitar Sitio Web Oficial</a>
        <a href="https://www.aeroambulanciasilva.com/contactus" class="link-btn">📩 Solicitar Información / Contacto</a>
    </div>

</body>
</html>
